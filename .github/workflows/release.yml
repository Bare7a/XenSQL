name: Release XenSQL

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release tag (required), e.g. v1.1.2'
        required: true
        type: string

permissions:
  contents: write

env:
  NODE_OPTIONS: '--max-old-space-size=4096'

jobs:
  build:
    strategy:
      matrix:
        build:
          - os: ubuntu-latest
            platform: linux/amd64
          - os: windows-latest
            platform: windows/amd64
          - os: macos-latest
            platform: darwin/universal

    runs-on: ${{ matrix.build.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux dependencies
        if: matrix.build.platform == 'linux/amd64'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libwebkitgtk-6.0-dev libglib2.0-dev pkg-config gcc

      - name: Install Wails3 CLI
        shell: bash
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      # Optional code signing - enabled when the matching repository secrets are set.
      # https://v3.wails.io/guides/build/signing/#github-actions-integration
      #
      # macOS:   MACOS_CERTIFICATE, MACOS_CERTIFICATE_PASSWORD, MACOS_SIGN_IDENTITY
      #          + APPLE_ID, APPLE_TEAM_ID, APPLE_APP_PASSWORD for notarization
      # Windows: WINDOWS_CERTIFICATE, WINDOWS_CERTIFICATE_PASSWORD
      # Linux:   PGP_PRIVATE_KEY, PGP_PASSWORD

      - name: Detect Linux package signing
        if: matrix.build.platform == 'linux/amd64'
        id: sign_linux
        shell: bash
        env:
          PGP_PRIVATE_KEY: ${{ secrets.PGP_PRIVATE_KEY }}
        run: |
          if [ -n "$PGP_PRIVATE_KEY" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Import PGP signing key
        if: matrix.build.platform == 'linux/amd64' && steps.sign_linux.outputs.enabled == 'true'
        shell: bash
        env:
          PGP_PRIVATE_KEY: ${{ secrets.PGP_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          echo "$PGP_PRIVATE_KEY" | base64 -d > signing-key.asc

      - name: Detect Windows code signing
        if: matrix.build.platform == 'windows/amd64'
        id: sign_windows
        shell: bash
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
        run: |
          if [ -n "$WINDOWS_CERTIFICATE" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Import Windows code signing certificate
        if: matrix.build.platform == 'windows/amd64' && steps.sign_windows.outputs.enabled == 'true'
        shell: pwsh
        env:
          CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE }}
        run: |
          $certBytes = [Convert]::FromBase64String($env:CERTIFICATE_BASE64)
          [IO.File]::WriteAllBytes("certificate.pfx", $certBytes)

      - name: Detect macOS code signing
        if: matrix.build.platform == 'darwin/universal'
        id: sign_macos
        shell: bash
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          if [ -n "$MACOS_CERTIFICATE" ] && [ -n "$MACOS_SIGN_IDENTITY" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            if [ -n "$APPLE_ID" ] && [ -n "$APPLE_TEAM_ID" ] && [ -n "$APPLE_APP_PASSWORD" ]; then
              echo "notarize=true" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Import macOS code signing certificate
        if: matrix.build.platform == 'darwin/universal' && steps.sign_macos.outputs.enabled == 'true'
        shell: bash
        env:
          CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE }}
          CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          echo "$CERTIFICATE_BASE64" | base64 --decode > certificate.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import certificate.p12 -k build.keychain -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain

      - name: Store macOS notarization credentials
        if: matrix.build.platform == 'darwin/universal' && steps.sign_macos.outputs.notarize == 'true'
        shell: bash
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          set -euo pipefail
          xcrun notarytool store-credentials "notarize-profile" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD"

      # The updater matches an asset by filename (GOOS+GOARCH) and unpacks a
      # single top-level entry, so each archive is named <platform>-<arch> and
      # holds exactly one entry: the binary (linux/windows) or XenSQL.app (macOS).
      # Plain XenSQL / XenSQL.exe (no platform tokens), distro packages
      # (XenSQL.deb, XenSQL.rpm, XenSQL.pkg.tar.zst, xensql-x86_64.AppImage), and
      # XenSQL-amd64-installer.exe are manual-download only.

      - name: Build & package (Linux)
        if: matrix.build.platform == 'linux/amd64'
        shell: bash
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1
        run: |
          set -euo pipefail
          wails3 package GOOS=linux
          mkdir -p dist
          # Auto-updater asset
          tar -C bin -czf "dist/XenSQL-linux-amd64.tar.gz" XenSQL
          # Manual downloads (updater skips — no GOOS/GOARCH in filenames)
          cp bin/XenSQL bin/XenSQL.deb bin/XenSQL.rpm bin/XenSQL.pkg.tar.zst bin/xensql-x86_64.AppImage dist/

      - name: Sign Linux packages
        if: matrix.build.platform == 'linux/amd64' && steps.sign_linux.outputs.enabled == 'true'
        shell: bash
        env:
          WAILS_PGP_PASSWORD: ${{ secrets.PGP_PASSWORD }}
        run: |
          set -euo pipefail
          wails3 tool sign --input "bin/XenSQL*.deb" --pgp-key signing-key.asc
          wails3 tool sign --input "bin/XenSQL*.rpm" --pgp-key signing-key.asc
          cp bin/XenSQL.deb bin/XenSQL.rpm dist/

      - name: Cleanup Linux signing material
        if: always() && matrix.build.platform == 'linux/amd64' && steps.sign_linux.outputs.enabled == 'true'
        shell: bash
        run: rm -f signing-key.asc

      - name: Install NSIS
        if: matrix.build.platform == 'windows/amd64'
        shell: pwsh
        run: winget install NSIS.NSIS --accept-source-agreements --accept-package-agreements

      - name: Build & package (Windows)
        if: matrix.build.platform == 'windows/amd64'
        shell: pwsh
        run: |
          wails3 package GOOS=windows
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path bin/XenSQL.exe -DestinationPath dist/XenSQL-windows-amd64.zip -Force
          Copy-Item bin/XenSQL.exe, bin/XenSQL-amd64-installer.exe dist/

      - name: Sign Windows binaries
        if: matrix.build.platform == 'windows/amd64' && steps.sign_windows.outputs.enabled == 'true'
        shell: pwsh
        env:
          WAILS_WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          wails3 tool sign --input bin/XenSQL.exe --certificate certificate.pfx
          wails3 tool sign --input bin/XenSQL-amd64-installer.exe --certificate certificate.pfx
          Copy-Item bin/XenSQL.exe, bin/XenSQL-amd64-installer.exe dist/ -Force
          Compress-Archive -Path bin/XenSQL.exe -DestinationPath dist/XenSQL-windows-amd64.zip -Force

      - name: Cleanup Windows signing material
        if: always() && matrix.build.platform == 'windows/amd64' && steps.sign_windows.outputs.enabled == 'true'
        shell: pwsh
        run: Remove-Item -Force -ErrorAction SilentlyContinue certificate.pfx

      - name: Build & package (macOS)
        if: matrix.build.platform == 'darwin/universal'
        shell: bash
        run: |
          set -euo pipefail
          wails3 task darwin:package:universal     # -> bin/XenSQL.app (universal)
          mkdir -p dist
          # Plain `zip` keeps XenSQL.app as the sole top-level entry (no __MACOSX/._).
          # The universal app runs on both arches, so publish it under both names.
          ( cd bin && zip -r -y -X "../dist/XenSQL-darwin-arm64.zip" "XenSQL.app" >/dev/null )
          cp "dist/XenSQL-darwin-arm64.zip" "dist/XenSQL-darwin-amd64.zip"
          # .dmg for manual installs; no darwin/arch tokens, so the updater skips it.
          hdiutil create -volname "XenSQL" -srcfolder "bin/XenSQL.app" -ov -format UDZO "dist/XenSQL-macos-universal.dmg"

      - name: Sign macOS application
        if: matrix.build.platform == 'darwin/universal' && steps.sign_macos.outputs.enabled == 'true'
        shell: bash
        env:
          SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
        run: |
          set -euo pipefail
          SIGN_ARGS=(--input "bin/XenSQL.app" --identity "$SIGN_IDENTITY")
          if [ "${{ steps.sign_macos.outputs.notarize }}" = "true" ]; then
            SIGN_ARGS+=(--notarize --keychain-profile notarize-profile)
          fi
          wails3 tool sign "${SIGN_ARGS[@]}"
          # Re-package signed app for release assets.
          ( cd bin && zip -r -y -X "../dist/XenSQL-darwin-arm64.zip" "XenSQL.app" >/dev/null )
          cp "dist/XenSQL-darwin-arm64.zip" "dist/XenSQL-darwin-amd64.zip"
          hdiutil create -volname "XenSQL" -srcfolder "bin/XenSQL.app" -ov -format UDZO "dist/XenSQL-macos-universal.dmg"

      - name: Cleanup macOS signing material
        if: always() && matrix.build.platform == 'darwin/universal' && steps.sign_macos.outputs.enabled == 'true'
        shell: bash
        run: rm -f certificate.p12

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.build.os }}
          path: dist/*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.version }}"
            if [ -z "${TAG// /}" ]; then
              echo "::error::Version tag is required for manual releases."
              exit 1
            fi
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            TAG="${{ github.ref_name }}"
          else
            echo "::error::Release job expects a v* tag push or workflow_dispatch with a version."
            exit 1
          fi
          if [[ ! "$TAG" =~ ^v ]]; then
            echo "::error::Release tag must start with 'v' (got: $TAG)"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate SHA256SUMS
        shell: bash
        working-directory: dist
        run: |
          set -euo pipefail
          # Updater verifies its picked asset against its line here.
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: XenSQL ${{ steps.release.outputs.tag }}
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(steps.release.outputs.tag, 'beta') || contains(steps.release.outputs.tag, 'rc') }}
