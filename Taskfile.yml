version: '3'

vars:
  APP_NAME: "XenSQL"
  BIN_DIR: "bin"
  PACKAGE_MANAGER: '{{.PACKAGE_MANAGER | default "npm"}}'
  VITE_PORT: '{{.WAILS_VITE_PORT | default 9245}}'
  COMPOSE: '{{.COMPOSE | default "docker compose"}}'

includes:
  common: ./build/Taskfile.yml
  windows: ./build/windows/Taskfile.yml
  darwin: ./build/darwin/Taskfile.yml
  linux: ./build/linux/Taskfile.yml
  ios: ./build/ios/Taskfile.yml
  android: ./build/android/Taskfile.yml

tasks:
  build:
    summary: Builds the application
    cmds:
      - task: "{{OS}}:build"

  package:
    summary: Packages a production build of the application
    cmds:
      - task: "{{OS}}:package"

  run:
    summary: Runs the application
    cmds:
      - task: "{{OS}}:run"

  dev:
    summary: Runs the application in development mode
    cmds:
      - wails3 dev -config ./build/config.yml -port {{.VITE_PORT}}

  setup:docker:
    summary: Builds Docker image for cross-compilation (~800MB download)
    cmds:
      - task: common:setup:docker

  build:server:
    summary: Builds the application in server mode (no GUI, HTTP server only)
    cmds:
      - task: common:build:server

  run:server:
    summary: Runs the application in server mode
    cmds:
      - task: common:run:server

  build:docker:
    summary: Builds a Docker image for server mode deployment
    cmds:
      - task: common:build:docker

  run:docker:
    summary: Builds and runs the Docker image
    cmds:
      - task: common:run:docker

  test:
    summary: Runs the Go unit tests (embedded SQLite, no database servers needed)
    cmds:
      - go test ./internal/...

  bump-version:
    summary: Show bump-version usage (wails3 task does not forward CLI flags)
    cmds:
      - go run ./cmd/bump-version -help

  bump-version:minor:
    summary: Bump minor version, then refresh build assets
    cmds:
      - go run ./cmd/bump-version -minor

  bump-version:patch:
    summary: Bump patch version, then refresh build assets
    cmds:
      - go run ./cmd/bump-version -patch

  bump-version:major:
    summary: Bump major version, then refresh build assets
    cmds:
      - go run ./cmd/bump-version -major

  bump-version:sync:
    summary: Sync non-build files to version.go, then refresh build assets
    cmds:
      - go run ./cmd/bump-version -sync

  bump-version:dry-run:minor:
    summary: Preview a minor version bump
    cmds:
      - go run ./cmd/bump-version -dry-run -minor

  bump-version:dry-run:patch:
    summary: Preview a patch version bump
    cmds:
      - go run ./cmd/bump-version -dry-run -patch

  bump-version:dry-run:major:
    summary: Preview a major version bump
    cmds:
      - go run ./cmd/bump-version -dry-run -major

  bump-version:set:*:
    summary: Set an explicit version (e.g. bump-version:set:1.2.0)
    vars:
      VERSION: '{{index .MATCH 0}}'
    cmds:
      - go run ./cmd/bump-version {{.VERSION}}

  build:check:
    summary: Compiles the app and every internal package without a full frontend build
    cmds:
      # Stub the embedded frontend so the //go:embed in main.go resolves; the real
      # assets come from `wails3 task build`.
      - mkdir -p frontend/dist
      - touch frontend/dist/.gitkeep
      - go build . ./internal/...

  e2e:go:
    summary: Runs the Go API E2E suite against an already-running database stack (see e2e:up)
    cmds:
      - go test -tags e2e -count=1 -run TestE2E -v ./internal/app/

  e2e:up:
    summary: Brings the database stack up and blocks until every server is healthy
    cmds:
      - "{{.COMPOSE}} up -d --wait"

  e2e:down:
    summary: Tears the database stack down and discards its volumes
    cmds:
      - "{{.COMPOSE}} down -v"

  e2e:logs:
    summary: Prints the database stack logs
    cmds:
      - "{{.COMPOSE}} logs --no-color"

  e2e:go:all:
    summary: One-shot Go API E2E - bring the stack up, run the suite, then always tear it down
    cmds:
      # defer registers first so teardown runs even if the suite (or startup) fails;
      # the task still exits non-zero when the suite fails.
      - defer: { task: e2e:down }
      - task: e2e:up
      - task: e2e:go

  e2e:ui:install:
    summary: Install Playwright dependencies and the Chromium browser
    dir: e2e
    cmds:
      - npm install
      - npx playwright install chromium

  e2e:ui:
    summary: Run the Playwright UI suite (drives the app in Wails server mode; data dir ./e2e/XenSQL-data)
    dir: e2e
    cmds:
      # e2e/playwright.config.ts builds the frontend, 
      # starts the server and brings the database stack up (global-setup) on its own.
      - npx playwright test

  e2e:ui:all:
    summary: One-shot UI E2E - DB stack up, run Playwright tests, then always tear down
    cmds:
      - defer: { task: e2e:down }
      - task: e2e:up
      - task: e2e:ui
